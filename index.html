<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED 大字報 - 閃爍隱藏版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: '微軟正黑體', sans-serif;
        }

        .marquee-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .marquee-text {
            font-size: 50vh;
            font-weight: bold;
            color: #FF0000;
            white-space: nowrap;
            position: absolute;
            text-shadow: 0 0 20px currentColor;
            /* 預設只有捲動動畫 */
            animation: scrollLeft 10s linear infinite;
        }

        /* 閃爍狀態的 Class */
        .marquee-text.blinking {
            /* 同時套用捲動與閃爍動畫 */
            animation: scrollLeft 10s linear infinite, blinkEffect 0.5s step-end infinite;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        @keyframes blinkEffect {
            50% { opacity: 0; }
        }

        /* 右下角星星按鈕 */
        .star-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            opacity: 0.2;
            z-index: 1000;
            transition: opacity 0.3s;
            user-select: none;
        }

        .star-toggle:hover { opacity: 0.9; }

        /* 控制面板 */
        .controls-panel {
            position: fixed;
            bottom: 65px;
            right: 20px;
            background: rgba(30, 30, 30, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            display: none;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .controls-panel.active { display: flex; }

        .control-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            color: white;
            font-size: 15px;
        }

        input[type="text"] {
            padding: 6px 10px;
            border-radius: 4px;
            border: none;
            width: 150px;
        }

        input[type="color"] {
            cursor: pointer;
            width: 40px;
            height: 30px;
            border: none;
            background: none;
        }

        input[type="range"] { width: 100px; }

        /* 勾選框樣式稍微放大 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="marquee-container">
        <div class="marquee-text" id="marqueeText">請點擊星星設定</div>
    </div>

    <div class="star-toggle" id="starBtn">★</div>

    <div class="controls-panel" id="controlsPanel">
        <div class="control-item">
            <label>文字</label>
            <input type="text" id="textInput" placeholder="輸入內容...">
        </div>
        <div class="control-item">
            <label>顏色</label>
            <input type="color" id="colorInput" value="#FF0000">
        </div>
        <div class="control-item">
            <label>速度</label>
            <input type="range" id="speedInput" min="2" max="38" value="15">
        </div>
        <div class="control-item">
            <label>閃爍效果</label>
            <input type="checkbox" id="blinkCheckbox">
        </div>
    </div>

    <script>
        const starBtn = document.getElementById('starBtn');
        const controlsPanel = document.getElementById('controlsPanel');
        const textInput = document.getElementById('textInput');
        const colorInput = document.getElementById('colorInput');
        const speedInput = document.getElementById('speedInput');
        const blinkCheckbox = document.getElementById('blinkCheckbox');
        const marqueeText = document.getElementById('marqueeText');

        // 切換面板
        starBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            controlsPanel.classList.toggle('active');
            starBtn.style.opacity = controlsPanel.classList.contains('active') ? '0.9' : '0.2';
        });

        // 點擊面板內部不收合
        controlsPanel.addEventListener('click', (e) => e.stopPropagation());

        // 文字更新
        textInput.addEventListener('input', (e) => {
            marqueeText.textContent = e.target.value || ' ';
        });

        // 顏色更新
        colorInput.addEventListener('input', (e) => {
            marqueeText.style.color = e.target.value;
        });

        // 速度更新
        speedInput.addEventListener('input', (e) => {
            const duration = 40 - e.target.value; 
            marqueeText.style.animationDuration = duration + 's, 0.5s'; // 保持閃爍頻率不變
        });

        // 閃爍切換
        blinkCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                marqueeText.classList.add('blinking');
            } else {
                marqueeText.classList.remove('blinking');
            }
        });

        // 點擊空白處收起
        document.addEventListener('click', () => {
            controlsPanel.classList.remove('active');
            starBtn.style.opacity = '0.2';
        });
    </script>
</body>
</html>
