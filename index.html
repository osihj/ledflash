<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED 舞台大字報 - 速度同步修正版</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Arial Black', 'Impact', '微軟正黑體', sans-serif;
        }

        .marquee-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        /* 核心文字樣式 */
        .marquee-text {
            font-size: 50vh;
            font-weight: 900;
            color: #FF0000;
            white-space: nowrap;
            position: absolute;
            text-shadow: 0 0 15px currentColor;
            /* 將捲動動畫分開定義，避免被覆蓋 */
            animation-name: scrollLeft;
            animation-timing-function: linear;
            animation-iteration-count: infinite;
            will-change: transform;
        }

        /* 1. 閃爍效果：僅定義閃爍部分，捲動由 JS 控制 */
        .effect-blink {
            animation-name: scrollLeft, blinkAnim !important;
            animation-timing-function: linear, step-end !important;
        }
        @keyframes blinkAnim { 50% { opacity: 0; } }

        /* 2. 七彩霓虹效果 */
        .effect-rainbow {
            background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation-name: scrollLeft, rainbowAnim !important;
            animation-timing-function: linear, linear !important;
            text-shadow: none !important;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
        @keyframes rainbowAnim { to { background-position: 200% center; } }

        /* LED 像素感 */
        .pixel-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
            background: radial-gradient(rgba(0,0,0,0.6) 30%, transparent 40%);
            background-size: 6px 6px;
        }
        .pixel-active .pixel-overlay { display: block; }

        @keyframes scrollLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* 控制面板 */
        .star-toggle { position: fixed; bottom: 25px; right: 25px; font-size: 30px; color: white; cursor: pointer; opacity: 0.2; z-index: 1000; transition: 0.3s; }
        .star-toggle:hover { opacity: 1; transform: scale(1.2); }
        .controls-panel {
            position: fixed; bottom: 80px; right: 25px; background: rgba(25, 25, 25, 0.95);
            padding: 20px; border-radius: 16px; display: none; flex-direction: column; gap: 12px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); z-index: 999; width: 280px;
        }
        .controls-panel.active { display: flex; }
        .control-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: white; font-size: 14px; }
        input[type="text"], select { padding: 8px; border-radius: 6px; border: none; width: 160px; background: #333; color: white; }
        input[type="color"] { cursor: pointer; width: 45px; height: 35px; border: none; background: none; }
        input[type="range"] { width: 160px; accent-color: #00e5ff; }
    </style>
</head>
<body id="bodyRoot">

    <div class="pixel-overlay"></div>
    <div class="marquee-container">
        <div class="marquee-text" id="marqueeText" style="animation-duration: 15s;">請輸入文字</div>
    </div>

    <div class="star-toggle" id="starBtn">★</div>

    <div class="controls-panel" id="controlsPanel">
        <div class="control-item">
            <label>看板文字</label>
            <input type="text" id="textInput" placeholder="輸入內容...">
        </div>
        <div class="control-item">
            <label>主要顏色</label>
            <input type="color" id="colorInput" value="#FF0000">
        </div>
        <div class="control-item">
            <label>捲動速度</label>
            <input type="range" id="speedInput" min="2" max="38" value="25">
        </div>
        <div class="control-item">
            <label>特效樣式</label>
            <select id="effectSelect">
                <option value="">純淨跑馬燈</option>
                <option value="effect-blink">警示閃爍</option>
                <option value="effect-rainbow">七彩霓虹</option>
            </select>
        </div>
        <div class="control-item">
            <label>LED 像素感</label>
            <input type="checkbox" id="pixelCheckbox">
        </div>
    </div>

    <script>
        const starBtn = document.getElementById('starBtn');
        const controlsPanel = document.getElementById('controlsPanel');
        const textInput = document.getElementById('textInput');
        const colorInput = document.getElementById('colorInput');
        const speedInput = document.getElementById('speedInput');
        const effectSelect = document.getElementById('effectSelect');
        const pixelCheckbox = document.getElementById('pixelCheckbox');
        const marqueeText = document.getElementById('marqueeText');
        const bodyRoot = document.getElementById('bodyRoot');

        // 更新速度的統一函式
        function updateSpeed() {
            const speedVal = speedInput.value;
            const scrollDuration = 40 - speedVal; // 捲動秒數
            
            // 根據不同效果，套用多重動畫秒數
            if (effectSelect.value === 'effect-blink') {
                marqueeText.style.animationDuration = `${scrollDuration}s, 0.4s`;
            } else if (effectSelect.value === 'effect-rainbow') {
                marqueeText.style.animationDuration = `${scrollDuration}s, 3s`;
            } else {
                marqueeText.style.animationDuration = `${scrollDuration}s`;
            }
        }

        // 面板切換
        starBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            controlsPanel.classList.toggle('active');
            starBtn.style.opacity = controlsPanel.classList.contains('active') ? '1' : '0.2';
        });

        document.addEventListener('click', () => {
            controlsPanel.classList.remove('active');
            starBtn.style.opacity = '0.2';
        });
        controlsPanel.addEventListener('click', (e) => e.stopPropagation());

        // 即時內容與顏色
        textInput.addEventListener('input', (e) => { marqueeText.textContent = e.target.value || ' '; });
        colorInput.addEventListener('input', (e) => {
            if (effectSelect.value !== 'effect-rainbow') {
                marqueeText.style.color = e.target.value;
            }
        });

        // 速度變動時
        speedInput.addEventListener('input', updateSpeed);

        // 特效切換時，也要重新執行一次速度更新
        effectSelect.addEventListener('change', (e) => {
            marqueeText.classList.remove('effect-blink', 'effect-rainbow');
            if (e.target.value) {
                marqueeText.classList.add(e.target.value);
            }
            if (e.target.value !== 'effect-rainbow') {
                marqueeText.style.color = colorInput.value;
            }
            updateSpeed(); // 關鍵：換效果時強制同步目前拉桿的速度秒數
        });

        // 像素感切換
        pixelCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) bodyRoot.classList.add('pixel-active');
            else bodyRoot.classList.remove('pixel-active');
        });

        // 初始化速度
        updateSpeed();
    </script>
</body>
</html>
