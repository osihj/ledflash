<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED 跑馬燈大字報</title>
    <style>
        /* 重置預設樣式並設定黑底 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            overflow: hidden; /* 隱藏捲軸 */
            font-family: '微軟正黑體', sans-serif;
        }

        /* 控制面板的樣式 */
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }

        /* 滑鼠移開時讓控制面板變透明，避免干擾畫面 */
        .controls:hover {
            opacity: 1;
        }
        .controls:not(:hover) {
            opacity: 0.3;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 16px;
        }

        input[type="text"] {
            font-size: 16px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            width: 200px;
        }

        input[type="color"] {
            cursor: pointer;
        }

        input[type="range"] {
            cursor: pointer;
        }

        /* 跑馬燈容器與文字樣式 */
        .marquee-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
        }

        .marquee-text {
            font-size: 40vw; /* 讓字體極大化 */
            font-weight: bold;
            color: #FF0000; /* 預設紅色 */
            white-space: nowrap;
            position: absolute;
            text-shadow: 0 0 20px currentColor; /* 增加一點發光效果 */
            animation: scrollLeft 10s linear infinite; /* 預設動畫速度 */
        }

        /* 跑馬燈由右至左的動畫關鍵影格 */
        @keyframes scrollLeft {
            0% {
                transform: translateX(100vw);
            }
            100% {
                transform: translateX(-100%);
            }
        }
    </style>
</head>
<body>

    <!-- 控制面板 -->
    <div class="controls">
        <div class="control-item">
            <label for="textInput">文字：</label>
            <input type="text" id="textInput" value="歡迎光臨！" placeholder="請輸入中文字...">
        </div>
        <div class="control-item">
            <label for="colorInput">顏色：</label>
            <input type="color" id="colorInput" value="#FF0000">
        </div>
        <div class="control-item">
            <label for="speedInput">速度：</label>
            <input type="range" id="speedInput" min="2" max="30" value="10">
        </div>
    </div>

    <!-- 跑馬燈顯示區 -->
    <div class="marquee-container">
        <div class="marquee-text" id="marqueeText">歡迎光臨！</div>
    </div>

    <!-- 互動邏輯腳本 -->
    <script>
        const textInput = document.getElementById('textInput');
        const colorInput = document.getElementById('colorInput');
        const speedInput = document.getElementById('speedInput');
        const marqueeText = document.getElementById('marqueeText');

        // 監聽文字輸入，即時更新大字報內容
        textInput.addEventListener('input', function(e) {
            marqueeText.textContent = e.target.value || ' ';
        });

        // 監聽顏色選擇，即時更新文字顏色與發光效果
        colorInput.addEventListener('input', function(e) {
            marqueeText.style.color = e.target.value;
        });

        // 監聽速度拉桿，調整動畫執行時間 (數值越大跑越快 = 動畫時間越短)
        speedInput.addEventListener('input', function(e) {
            // 用 32 減去目前數值來反轉邏輯，讓拉桿往右(數值大)時秒數變小(速度變快)
            const duration = 32 - e.target.value;
            marqueeText.style.animationDuration = duration + 's';
        });
    </script>
</body>
</html>
