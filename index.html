<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED 舞台大字報 - 專業精簡版</title>
    <style>
        /* ==============================
           基礎與容器設定
           ============================== */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000000; /* 固定純黑背景 */
            overflow: hidden;
            font-family: 'Arial Black', 'Impact', '微軟正黑體', sans-serif;
        }

        .marquee-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .marquee-text {
            font-size: 50vh;
            font-weight: 900;
            color: #FF0000;
            white-space: nowrap;
            position: absolute;
            text-shadow: 0 0 15px currentColor;
            animation: scrollLeft 10s linear infinite;
            will-change: transform;
        }

        /* ==============================
           特效 CSS
           ============================== */

        /* 1. 閃爍效果 */
        .effect-blink {
            animation: scrollLeft 10s linear infinite, blinkAnim 0.4s step-end infinite !important;
        }
        @keyframes blinkAnim { 50% { opacity: 0; } }

        /* 2. 七彩霓虹效果 */
        .effect-rainbow {
            background: linear-gradient(to right, #ef5350, #f48fb1, #7e57c2, #2196f3, #26c6da, #43a047, #eeff41, #f9a825, #ff5722);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: scrollLeft 10s linear infinite, rainbowAnim 3s linear infinite !important;
            text-shadow: none !important;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }
        @keyframes rainbowAnim { to { background-position: 200% center; } }

        /* 3. 像素點陣遮罩 (LED 顆粒感) */
        .pixel-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
            background: radial-gradient(rgba(0,0,0,0.6) 30%, transparent 40%);
            background-size: 6px 6px;
        }
        .pixel-active .pixel-overlay { display: block; }

        @keyframes scrollLeft { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        /* ==============================
           控制面板 (星星)
           ============================== */
        .star-toggle { 
            position: fixed; bottom: 25px; right: 25px; 
            font-size: 30px; color: white; cursor: pointer; 
            opacity: 0.2; z-index: 1000; transition: 0.3s; user-select: none; 
        }
        .star-toggle:hover { opacity: 1; transform: scale(1.2); }

        .controls-panel {
            position: fixed; bottom: 80px; right: 25px; 
            background: rgba(25, 25, 25, 0.95);
            padding: 20px; border-radius: 16px; display: none; 
            flex-direction: column; gap: 12px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 999; box-shadow: 0 10px 40px rgba(0,0,0,0.8); width: 280px;
        }
        .controls-panel.active { display: flex; }

        .control-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: white; font-size: 14px; }
        
        input[type="text"], select { 
            padding: 8px; border-radius: 6px; border: none; 
            width: 160px; background: #333; color: white; 
        }
        input[type="color"] { cursor: pointer; width: 45px; height: 35px; border: none; background: none; }
        input[type="range"] { width: 160px; accent-color: #00e5ff; }
    </style>
</head>
<body id="bodyRoot">

    <!-- 像素點陣疊加層 -->
    <div class="pixel-overlay"></div>

    <div class="marquee-container">
        <div class="marquee-text" id="marqueeText">請設定文字</div>
    </div>

    <!-- 右下角星星隱藏開關 -->
    <div class="star-toggle" id="starBtn">★</div>

    <div class="controls-panel" id="controlsPanel">
        <div class="control-item">
            <label>看板文字</label>
            <input type="text" id="textInput" placeholder="在此輸入中文字...">
        </div>
        <div class="control-item">
            <label>主要顏色</label>
            <input type="color" id="colorInput" value="#FF0000">
        </div>
        <div class="control-item">
            <label>捲動速度</label>
            <input type="range" id="speedInput" min="2" max="38" value="18">
        </div>
        <div class="control-item">
            <label>特效樣式</label>
            <select id="effectSelect">
                <option value="">純淨跑馬燈</option>
                <option value="effect-blink">警示閃爍</option>
                <option value="effect-rainbow">七彩霓虹</option>
            </select>
        </div>
        <div class="control-item">
            <label>LED 像素感</label>
            <input type="checkbox" id="pixelCheckbox">
        </div>
    </div>

    <script>
        const starBtn = document.getElementById('starBtn');
        const controlsPanel = document.getElementById('controlsPanel');
        const textInput = document.getElementById('textInput');
        const colorInput = document.getElementById('colorInput');
        const speedInput = document.getElementById('speedInput');
        const effectSelect = document.getElementById('effectSelect');
        const pixelCheckbox = document.getElementById('pixelCheckbox');
        const marqueeText = document.getElementById('marqueeText');
        const bodyRoot = document.getElementById('bodyRoot');

        // 開關面板邏輯
        starBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            controlsPanel.classList.toggle('active');
            starBtn.style.opacity = controlsPanel.classList.contains('active') ? '1' : '0.2';
        });

        document.addEventListener('click', () => {
            controlsPanel.classList.remove('active');
            starBtn.style.opacity = '0.2';
        });
        controlsPanel.addEventListener('click', (e) => e.stopPropagation());

        // 文字更新
        textInput.addEventListener('input', (e) => {
            marqueeText.textContent = e.target.value || ' ';
        });

        // 顏色更新
        colorInput.addEventListener('input', (e) => {
            if (effectSelect.value !== 'effect-rainbow') {
                marqueeText.style.color = e.target.value;
            }
        });

        // 速度更新
        speedInput.addEventListener('input', (e) => {
            const duration = 40 - e.target.value; 
            marqueeText.style.animationDuration = duration + 's, 0.4s, 3s'; 
        });

        // 特效切換
        effectSelect.addEventListener('change', (e) => {
            marqueeText.classList.remove('effect-blink', 'effect-rainbow');
            if (e.target.value) {
                marqueeText.classList.add(e.target.value);
            }
            if (e.target.value !== 'effect-rainbow') {
                marqueeText.style.color = colorInput.value;
            }
        });

        // 像素感切換
        pixelCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                bodyRoot.classList.add('pixel-active');
            } else {
                bodyRoot.classList.remove('pixel-active');
            }
        });
    </script>
</body>
</html>
